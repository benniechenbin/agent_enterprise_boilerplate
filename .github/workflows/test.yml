name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Secret scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Check lockfile
      run: uv lock --check

    - name: Install dependencies
      run: uv sync --extra dev --frozen

    - name: Run checks
      run: make check

    - name: Run tests
      run: make test

    - name: Run application smoke test
      run: uv run agent-app

    - name: Build Docker image
      run: docker build -t agent-enterprise-boilerplate:ci .

    - name: Run Docker smoke test
      run: docker run --rm agent-enterprise-boilerplate:ci
